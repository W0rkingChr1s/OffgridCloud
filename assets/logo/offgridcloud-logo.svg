  <!-- Wordmark -->
  <text x="232" y="132" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="68" font-weight="700" fill="url(#lkWord)">Offgrid<tspan fill="#312E81">Cloud</tspan></text>
  <text x="234" y="176" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="2" fill="#64748B">UPLOAD WHEN THE SIGNAL IS RIGHT</text>
</svg>
