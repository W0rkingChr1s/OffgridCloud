<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OffgridCloud Dashboard: Kachel-Uebersicht der Ordner mit Upload-Fortschritt, Status und Bandbreiten-Leiste im Dark-Mode">
  <defs>
    <linearGradient id="dBg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.6" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1a1a4a"/>
    </linearGradient>
    <linearGradient id="dTeal" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0EA5A4"/><stop offset="1" stop-color="#1D4ED8"/></linearGradient>
    <linearGradient id="dBlue" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1D4ED8"/><stop offset="1" stop-color="#312E81"/></linearGradient>
    <linearGradient id="dIndigo" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#312E81"/><stop offset="1" stop-color="#0EA5A4"/></linearGradient>
    <linearGradient id="dTile" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0EA5A4"/><stop offset="0.55" stop-color="#1D4ED8"/><stop offset="1" stop-color="#312E81"/></linearGradient>
    <filter id="dShadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/></filter>
    <style>
      text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .brand { fill:#f8fafc; font-size:19px; font-weight:800; }
      .h2    { fill:#f8fafc; font-size:30px; font-weight:800; }
      .lead  { fill:#94a3b8; font-size:15px; }
      .fname { fill:#ffffff; font-size:19px; font-weight:700; }
      .fdesc { fill:#94a3b8; font-size:13.5px; }
      .stat  { font-size:12.5px; font-weight:600; }
      .barlbl{ fill:#64748b; font-size:13px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="20" fill="url(#dBg)"/>
  <rect x="0.5" y="0.5" width="1199" height="799" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- ===== Header (sticky bar) ===== -->
  <rect x="0" y="0" width="1200" height="72" rx="20" fill="#0f172a" fill-opacity="0.85"/>
  <rect x="0" y="52" width="1200" height="20" fill="#0f172a" fill-opacity="0.0"/>
  <line x1="0" y1="72" x2="1200" y2="72" stroke="#ffffff" stroke-opacity="0.06"/>
  <!-- logo icon -->
  <g transform="translate(36,20)">
    <rect x="0" y="0" width="34" height="34" rx="10" fill="url(#dTile)"/>
    <path d="M9 27 a7 7 0 0 1 1 -14 a9 9 0 0 1 17 -1 a6 6 0 0 1 1 15 z" fill="#fff"/>
    <rect x="15" y="16" width="5" height="11" rx="2.5" fill="#0EA5A4"/>
    <path d="M17.5 10 l6 8 h-12 z" fill="#0EA5A4"/>
  </g>
  <text x="82" y="44" class="brand">OffgridCloud</text>
  <!-- menu button -->
  <rect x="1128" y="20" width="36" height="36" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
  <g stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"><line x1="1138" y1="32" x2="1154" y2="32"/><line x1="1138" y1="38" x2="1154" y2="38"/><line x1="1138" y1="44" x2="1154" y2="44"/></g>

  <!-- ===== Page heading ===== -->
  <text x="36" y="130" class="h2">Ordner</text>
  <text x="36" y="158" class="lead">W&#228;hle einen Ordner, um Medien hochzuladen.</text>
  <!-- manage button -->
  <rect x="1010" y="112" width="154" height="40" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="1087" y="137" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="600">Ordner verwalten</text>

  <!-- ===== Bandwidth status strip ===== -->
  <rect x="36" y="180" width="1128" height="52" rx="16" fill="#1e293b" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.05"/>
  <circle cx="62" cy="206" r="5" fill="#34d399"/>
  <text x="78" y="211" fill="#cbd5e1" font-size="14" font-weight="600">Uploads bereit</text>
  <text x="210" y="211" fill="#64748b" font-size="14">Limit: 4096 KB/s</text>
  <text x="368" y="211" fill="#64748b" font-size="14">Gemessen: 3820 KB/s</text>
  <!-- signal bars mini -->
  <g transform="translate(560,196)"><rect x="0" y="14" width="7" height="8" rx="2" fill="#0EA5A4"/><rect x="11" y="8" width="7" height="14" rx="2" fill="#0EA5A4"/><rect x="22" y="2" width="7" height="20" rx="2" fill="#0EA5A4"/></g>
  <text x="1030" y="211" text-anchor="end" fill="#64748b" font-size="14">3 aktiv &#183; 12 wartend</text>

  <!-- ===== Folder tile grid (3 x 2) ===== -->
  <!-- Tile template helper positions: x = 36, 424, 812 ; width 352 ; y = 260, 540 -->

  <!-- Tile 1 -->
  <g filter="url(#dShadow)">
    <rect x="36" y="262" width="352" height="248" rx="18" fill="#1e293b" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
  <rect x="60" y="288" width="48" height="6" rx="3" fill="url(#dTeal)"/>
  <text x="60" y="330" class="fname">Drohnen-Rohmaterial</text>
  <text x="60" y="356" class="fdesc">4K-Fl&#252;ge Talsperre, Tag 3</text>
  <rect x="60" y="380" width="304" height="7" rx="3.5" fill="#334155"/>
  <rect x="60" y="380" width="228" height="7" rx="3.5" fill="url(#dTeal)"/>
  <g><text x="60" y="416" class="stat" fill="#94a3b8">312 Dateien</text>
     <text x="150" y="416" class="stat" fill="#34d399">234 fertig</text>
     <text x="238" y="416" class="stat" fill="#0EA5A4">6 l&#228;dt</text>
     <text x="296" y="416" class="stat" fill="#94a3b8">72 wartend</text></g>
  <rect x="60" y="440" width="304" height="46" rx="10" fill="#0f172a" fill-opacity="0.6"/>
  <text x="76" y="468" fill="#64748b" font-size="12.5">Ziel: Amazon S3 &#183; Nextcloud</text>
  <circle cx="348" cy="463" r="4" fill="#34d399"/>

  <!-- Tile 2 -->
  <g filter="url(#dShadow)">
    <rect x="424" y="262" width="352" height="248" rx="18" fill="#1e293b" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
  <rect x="448" y="288" width="48" height="6" rx="3" fill="url(#dBlue)"/>
  <text x="448" y="330" class="fname">Interviews Boot-Crew</text>
  <text x="448" y="356" class="fdesc">O-T&#246;ne &amp; B-Roll, Etappe Nord</text>
  <rect x="448" y="380" width="304" height="7" rx="3.5" fill="#334155"/>
  <rect x="448" y="380" width="304" height="7" rx="3.5" fill="url(#dBlue)"/>
  <g><text x="448" y="416" class="stat" fill="#94a3b8">88 Dateien</text>
     <text x="528" y="416" class="stat" fill="#34d399">88 fertig</text></g>
  <rect x="448" y="440" width="304" height="46" rx="10" fill="#0f172a" fill-opacity="0.6"/>
  <text x="464" y="468" fill="#64748b" font-size="12.5">Ziel: Azure Blob</text>
  <g transform="translate(656,451)"><circle cx="8" cy="8" r="8" fill="#10b981" fill-opacity="0.18"/><path d="M4 8 l3 3 5 -6" stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
  <text x="680" y="468" fill="#34d399" font-size="12.5" font-weight="600">synchron</text>

  <!-- Tile 3 -->
  <g filter="url(#dShadow)">
    <rect x="812" y="262" width="352" height="248" rx="18" fill="#1e293b" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
  <rect x="836" y="288" width="48" height="6" rx="3" fill="url(#dIndigo)"/>
  <text x="836" y="330" class="fname">Sensor-Logs LKW-2</text>
  <text x="836" y="356" class="fdesc">Telemetrie-Dumps, st&#252;ndlich</text>
  <rect x="836" y="380" width="304" height="7" rx="3.5" fill="#334155"/>
  <rect x="836" y="380" width="140" height="7" rx="3.5" fill="url(#dIndigo)"/>
  <g><text x="836" y="416" class="stat" fill="#94a3b8">640 Dateien</text>
     <text x="928" y="416" class="stat" fill="#34d399">290 fertig</text>
     <text x="1020" y="416" class="stat" fill="#0EA5A4">4 l&#228;dt</text>
     <text x="1074" y="416" class="stat" fill="#f87171">3 Fehler</text></g>
  <rect x="836" y="440" width="304" height="46" rx="10" fill="#0f172a" fill-opacity="0.6"/>
  <text x="852" y="468" fill="#64748b" font-size="12.5">Ziel: SFTP &#183; Hetzner Storage Box</text>
  <circle cx="1124" cy="463" r="4" fill="#fbbf24"/>

  <!-- Tile 4 -->
  <g filter="url(#dShadow)">
    <rect x="36" y="542" width="352" height="230" rx="18" fill="#1e293b" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
  <rect x="60" y="568" width="48" height="6" rx="3" fill="url(#dTeal)"/>
  <text x="60" y="610" class="fname">Foto-Reportage Team A</text>
  <text x="60" y="636" class="fdesc">RAW + JPEG, freigegeben an Team</text>
  <rect x="60" y="660" width="304" height="7" rx="3.5" fill="#334155"/>
  <rect x="60" y="660" width="180" height="7" rx="3.5" fill="url(#dTeal)"/>
  <g><text x="60" y="696" class="stat" fill="#94a3b8">156 Dateien</text>
     <text x="152" y="696" class="stat" fill="#34d399">92 fertig</text>
     <text x="228" y="696" class="stat" fill="#94a3b8">64 wartend</text></g>
  <g transform="translate(60,714)">
    <rect x="0" y="0" width="70" height="26" rx="8" fill="#0EA5A4" fill-opacity="0.14"/><text x="35" y="18" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="600">#teamA</text>
    <rect x="80" y="0" width="66" height="26" rx="8" fill="#0EA5A4" fill-opacity="0.14"/><text x="113" y="18" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="600">#foto</text>
  </g>

  <!-- Tile 5 -->
  <g filter="url(#dShadow)">
    <rect x="424" y="542" width="352" height="230" rx="18" fill="#1e293b" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
  <rect x="448" y="568" width="48" height="6" rx="3" fill="url(#dBlue)"/>
  <text x="448" y="610" class="fname">Backup Kartendaten</text>
  <text x="448" y="636" class="fdesc">GIS-Kacheln, gespiegelt auf 2 Ziele</text>
  <rect x="448" y="660" width="304" height="7" rx="3.5" fill="#334155"/>
  <rect x="448" y="660" width="270" height="7" rx="3.5" fill="url(#dBlue)"/>
  <g><text x="448" y="696" class="stat" fill="#94a3b8">1204 Dateien</text>
     <text x="548" y="696" class="stat" fill="#34d399">1180 fertig</text>
     <text x="660" y="696" class="stat" fill="#0EA5A4">2 l&#228;dt</text></g>
  <rect x="448" y="714" width="304" height="30" rx="9" fill="#0f172a" fill-opacity="0.6"/>
  <text x="464" y="734" fill="#64748b" font-size="12">Ziel: MinIO &#183; WebDAV (Spiegelung)</text>

  <!-- Tile 6 -->
  <g filter="url(#dShadow)">
    <rect x="812" y="542" width="352" height="230" rx="18" fill="#1e293b" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
  <rect x="836" y="568" width="48" height="6" rx="3" fill="url(#dIndigo)"/>
  <text x="836" y="610" class="fname">Rohschnitt Doku</text>
  <text x="836" y="636" class="fdesc">ProRes-Clips, gro&#223;e Dateien</text>
  <rect x="836" y="660" width="304" height="7" rx="3.5" fill="#334155"/>
  <rect x="836" y="660" width="60" height="7" rx="3.5" fill="url(#dIndigo)"/>
  <g><text x="836" y="696" class="stat" fill="#94a3b8">42 Dateien</text>
     <text x="916" y="696" class="stat" fill="#34d399">8 fertig</text>
     <text x="978" y="696" class="stat" fill="#94a3b8">34 wartend</text></g>
  <rect x="836" y="714" width="304" height="30" rx="9" fill="#312E81" fill-opacity="0.25"/>
  <g transform="translate(852,721)"><rect x="0" y="4" width="7" height="8" rx="2" fill="#818cf8"/><rect x="10" y="0" width="7" height="12" rx="2" fill="#818cf8" fill-opacity="0.4"/></g>
  <text x="878" y="734" fill="#a5b4fc" font-size="12">wartet auf mehr Bandbreite</text>
</svg>
