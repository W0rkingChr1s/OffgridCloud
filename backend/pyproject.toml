[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI uses callables (Depends/Security) as argument defaults by design.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Security"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
